name: Mebelmart GUI Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]
      fail-fast: false

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Browser
      - name: Install Playwright browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      # Tests
      - name: Run tests (${{ matrix.browser }})
        env:
          BROWSER: ${{ matrix.browser }}
          HEADLESS: "true"
        run: |
          pytest \
            --browser=${{ matrix.browser }} \
            --headless=true \
            --alluredir=allure-results \
            -v \
            --tb=short
        continue-on-error: true

      # Screenshots
      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7

      # Allure
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 7

  publish-report:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results (chromium)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chromium
          path: allure-results

      - name: Download Allure results (firefox)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results
        continue-on-error: true

      # Pull existing Allure history from gh-pages so trend charts work
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy history into results
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/. allure-results/history/
          fi
        continue-on-error: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true
